# grafana-datasources.yml
apiVersion: 1

datasources:
  # Prometheus data source for metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

groups:
    - orgId: 1
      name: 1m-evaluation
      folder: metric-alerts
      interval: 1m
      rules:
        - uid: bce68161-ead3-46c2-a0da-55960d01b371
          title: Coffee Grinds Error Alert
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                disableTextWrap: false
                editorMode: builder
                expr: increase(otel_otelcol_http_server_duration_count{http_status_code="500"}[5m])
                fullMetaSearch: false
                includeNullMetadata: true
                instant: false
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: true
                refId: A
                useBackend: false
            - refId: C
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 0s
          annotations:
            runbook_url: https://www.notion.so/Runbook-Coffee-Grind-API-Regional-Failover-331e03a02980811884b6f70ae6773c59?source=copy_link
            summary: Spike in 5XX on the Coffee Grind Service
          labels: {}
          isPaused: false

contactPoints:
    - orgId: 1
      name: team-cappucino-slack
      receivers:
        - uid: edbd5c29-12e1-43ea-b0a5-83b05268a4e3
          type: slack
          settings:
            url: ${SLACK_WEBHOOK_URL}
          disableResolveMessage: false